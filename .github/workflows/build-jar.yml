name: Build JAR + Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.5 (Halo plugin 0.4.0 不兼容 Gradle 9.x)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -E '^  version:' src/main/resources/plugin.yaml | sed 's/.*version: *//' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Plugin version: $VERSION"

      - name: Build JAR
        run: gradle clean build -x test --info --stacktrace

      - name: Find built JAR
        id: jar
        run: |
          ls -la build/libs/ || true
          JAR=$(find build/libs -name 'aitseo-connect-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-plain.jar' | head -1)
          if [ -z "$JAR" ]; then
            # 试 plain.jar (Spring Boot 项目可能输出这个)
            JAR=$(find build/libs -name 'aitseo-connect-*.jar' | head -1)
          fi
          if [ -z "$JAR" ]; then
            echo "❌ JAR not found in build/libs/"
            exit 1
          fi
          cp "$JAR" build/libs/aitseo-connect.jar
          echo "stable_path=build/libs/aitseo-connect.jar" >> $GITHUB_OUTPUT
          echo "Built JAR: $JAR"

      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: aitseo-connect-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: build/libs/aitseo-connect.jar
          retention-days: 30

      - name: Create/update GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (auto)"
          body: |
            自动构建于 commit ${{ github.sha }}

            版本: ${{ steps.version.outputs.version }}

            下载 `aitseo-connect.jar`, 在 Halo 后台 → 插件 → 安装 上传即可。
          files: build/libs/aitseo-connect.jar
          prerelease: false
          make_latest: true

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/aitseo-connect.jar
          generate_release_notes: true
