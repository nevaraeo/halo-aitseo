apiVersion: v1alpha1
kind: Setting
metadata:
  name: aitseo-connect-setting
spec:
  forms:
    - group: basic
      label: 基础配置
      formSchema:
        - $formkit: text
          name: connectionKey
          label: 连接密钥 (Connection Key)
          help: |
            ⚠️ 必填. 自己生成一个 swc_ 开头的 32+ 字符字符串, 例如:
            swc_aabbccddeeff00112233445566778899aabbccddeeff00112233445566778899
            把同一字符串复制到 AITSEO dashboard 的「Connection Key」字段, 两边一致就能验证连接.
            (随机生成器: 命令行 `openssl rand -hex 32` 或在线 hex 生成器)
          placeholder: "swc_..."
          validation: "length:32"
        - $formkit: text
          name: publishOwner
          label: 文章作者 username
          help: "AITSEO 推送的文章会以这个用户的身份发布。默认 admin，如果你改过 Halo 默认管理员名字请填实际 username (注:不是显示名)。Halo 后台「文章管理」会按这个 username 过滤展示。"
          placeholder: "admin"
          value: "admin"
        - $formkit: text
          name: defaultCategory
          label: 默认分类 (可选)
          help: "AITSEO 发布文章时如未指定分类, 自动归到这个分类的 metadata.name"
          placeholder: "default-category-name"
        - $formkit: text
          name: defaultTags
          label: 默认标签 (可选, 逗号分隔)
          help: "AITSEO 发布文章时如未指定标签, 自动加这些标签 (metadata.name 列表, 逗号分隔)"
          placeholder: "ai-generated,seo"
        - $formkit: select
          name: publishImmediately
          label: 自动发布
          help: "AITSEO 推送来的文章是否立即发布。否 = 留草稿, 需要人工审核。"
          value: "true"
          options:
            - { label: "立即发布", value: "true" }
            - { label: "存草稿", value: "false" }
