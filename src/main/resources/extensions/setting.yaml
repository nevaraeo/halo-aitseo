apiVersion: v1alpha1
kind: Setting
metadata:
  name: aitseo-connect-setting
spec:
  forms:
    - group: basic
      label: 基础配置
      formSchema:
        - $formkit: text
          name: connectionKey
          label: 连接密钥 (Connection Key)
          help: |
            ⚠️ 此密钥由 AITSEO dashboard「自动申请密钥」按钮生成, 通常不要手动编辑.
            但如果你弄丢了原 key 想重新生成: 把本字段清空 → 保存 → 回 AITSEO dashboard
            点「自动申请密钥」, 会自动生成新 key. 这是设计上的恢复机制 (要 Halo
            admin 权限才能清空, 防止外人篡改).
          placeholder: "(尚未生成, 去 AITSEO dashboard 申请)"
        - $formkit: text
          name: publishOwner
          label: 文章作者 username
          help: "AITSEO 推送的文章会以这个用户的身份发布。默认 admin，如果你改过 Halo 默认管理员名字请填实际 username (注:不是显示名)。Halo 后台「文章管理」会按这个 username 过滤展示。"
          placeholder: "admin"
          value: "admin"
        - $formkit: text
          name: defaultCategory
          label: 默认分类 (可选)
          help: "AITSEO 发布文章时如未指定分类, 自动归到这个分类的 metadata.name"
          placeholder: "default-category-name"
        - $formkit: text
          name: defaultTags
          label: 默认标签 (可选, 逗号分隔)
          help: "AITSEO 发布文章时如未指定标签, 自动加这些标签 (metadata.name 列表, 逗号分隔)"
          placeholder: "ai-generated,seo"
        - $formkit: select
          name: publishImmediately
          label: 自动发布
          help: "AITSEO 推送来的文章是否立即发布。否 = 留草稿, 需要人工审核。"
          value: "true"
          options:
            - { label: "立即发布", value: "true" }
            - { label: "存草稿", value: "false" }
