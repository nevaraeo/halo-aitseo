# ConfigMap 只声明 shell, 不预设 data —— Halo 升级时不会覆盖
# 用户已保存的 connectionKey. Plugin.start() 全权负责:
#   - ConfigMap 首次出现时 data 是 null/{} -> Plugin.start 写入 basic.connectionKey
#   - 后续升级时 data 已有用户的 key -> Plugin.start 检测到非空就不动
apiVersion: v1alpha1
kind: ConfigMap
metadata:
  name: aitseo-connect-configmap
