# ConfigMap 只声明 shell + 空 data —— Halo 升级时不会覆盖用户已保存的
# connectionKey. Plugin.start() 检测 data 为空就生成新 key 写回, 检测到
# 已有 key 就保留.
#
# 注: 必须给 data 至少一个空对象 {}, Halo 2.24+ 在内部 forEach data 时
# 不允许 null, 否则 NPE: Cannot invoke "Map.forEach(...)" because "map" is null
apiVersion: v1alpha1
kind: ConfigMap
metadata:
  name: aitseo-connect-configmap
data: {}
