# Admin-bindable role for managing AITSEO Connect plugin settings.
# (Plugin REST endpoints under /aitseo-connect/api/v1alpha1/** bypass Halo
# RBAC entirely via path prefix; this role is only used inside Halo admin UI
# for permission scoping.)
apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-aitseo-connect-manage
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "AITSEO Connect"
    rbac.authorization.halo.run/display-name: "AITSEO Connect 管理"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:aitseo-connect:manage"]
rules:
  - apiGroups: ["aitseo.run"]
    resources: ["*"]
    verbs: ["*"]
